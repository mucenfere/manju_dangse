<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문건 목록 — 청대 당안 열람실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=IM+Fell+English:ital@0;1&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #f7f8fa;
    --paper:        #ffffff;
    --ink:          #1a1e2e;
    --ink-mid:      #3a3f52;
    --ink-light:    #7a8099;
    --accent:       #8b2e0f;
    --accent-warm:  #c4520a;
    --gold:         #b8912a;
    --border:       #d4d8e2;
    --border-light: #e8eaf0;
    --header-bg:    #e8dcc8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif KR', serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    padding: 34px 67px 28px;     /* 24×1.4  48×1.4  20×1.4 */
    border-bottom: 4px solid var(--gold);
  }

  .header-inner {
    max-width: 1540px;            /* 1100×1.4 */
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 34px;                    /* 24×1.4 */
  }

  .breadcrumb {
    font-size: 1.01rem;           /* 0.72×1.4 */
    color: var(--accent);
    margin-bottom: 8px;           /* 6×1.4≈8 */
    font-family: 'IM Fell English', serif;
  }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  h1 {
    font-size: 1.96rem;           /* 1.4×1.4 */
    font-weight: 700;
    color: #2a1f14;
    line-height: 1.3;
  }
  h1 em {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.26rem;           /* 0.9×1.4 */
    color: var(--accent);
    display: block;
    font-weight: 400;
    margin-top: 3px;              /* 2×1.4≈3 */
  }

  /* ── MAIN ── */
  main {
    max-width: 1540px;            /* 1100×1.4 */
    margin: 0 auto;
    padding: 39px 67px 112px;    /* 28×1.4  48×1.4  80×1.4 */
    animation: fadeUp 0.4s ease both;
  }

  /* ── 전종 탭 ── */
  .jongwon-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;          /* 20×1.4 */
    border-bottom: 2px solid var(--border);
  }

  .j-tab {
    padding: 13px 28px;           /* 9×1.4  20×1.4 */
    font-size: 1.12rem;           /* 0.8×1.4 */
    color: var(--ink-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .j-tab:hover { color: var(--ink); }
  .j-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .j-tab .tab-count { font-family: 'IM Fell English', serif; font-size: 0.98rem; color: var(--ink-light); margin-left: 7px; }

  /* ── 툴바 ── */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;          /* 16×1.4 */
    gap: 17px;                    /* 12×1.4 */
  }

  .search-bar { display: flex; gap: 14px; flex: 1; }

  .search-input {
    flex: 1;
    padding: 13px 20px;           /* 9×1.4  14×1.4 */
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Noto Serif KR', serif;
    font-size: 1.19rem;           /* 0.85×1.4 */
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.2s;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--ink-light); }

  /* ── 버튼 ── */
  .btn {
    padding: 13px 25px;           /* 9×1.4  18×1.4 */
    border-radius: 4px;
    font-family: 'Noto Serif KR', serif;
    font-size: 1.15rem;           /* 0.82×1.4 */
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-search { background: var(--ink); color: white; }
  .btn-search:hover { background: var(--accent); }
  .btn-add { background: var(--accent); color: white; }
  .btn-add:hover { background: var(--accent-warm); }
  .btn-save { background: var(--accent); color: white; }
  .btn-save:hover { background: var(--accent-warm); }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--ink-light); }
  .btn-cancel:hover { border-color: var(--ink); color: var(--ink); }
  .btn-delete { background: none; border: 1px solid #e0a0a0; color: #c04040; font-size: 1.05rem; padding: 8px 17px; }
  .btn-delete:hover { background: #fde8e8; }

  /* ── 결과 요약 ── */
  .result-summary {
    font-size: 1.05rem;           /* 0.75×1.4 */
    color: var(--ink-light);
    margin-bottom: 17px;          /* 12×1.4 */
    font-family: 'IM Fell English', serif;
    font-style: italic;
  }
  .result-summary strong { color: var(--accent); font-style: normal; }

  /* ── 테이블 ── */
  .doc-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--paper);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    overflow: hidden;
    font-size: 1.15rem;           /* 0.82×1.4 */
  }

  .doc-table thead th {
    text-align: left;
    padding: 14px 20px;           /* 10×1.4  14×1.4 */
    font-size: 0.95rem;           /* 0.68×1.4 */
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .doc-table thead th:hover { color: var(--accent); }
  .doc-table thead th.no-sort { cursor: default; }
  .doc-table thead th.no-sort:hover { color: var(--ink-light); }

  .doc-table tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background 0.12s;
  }
  .doc-table tbody tr:hover { background: #f5f0f8; }
  .doc-table tbody tr:last-child { border-bottom: none; }

  .doc-table tbody td {
    padding: 14px 20px;           /* 10×1.4  14×1.4 */
    color: var(--ink-mid);
    vertical-align: middle;
  }

  .td-id { font-family: 'Noto Serif KR', serif; color: var(--accent); font-size: 1.05rem; white-space: nowrap; letter-spacing: 0.02em; }
  .td-title { font-weight: 600; color: var(--ink); cursor: pointer; }
  .td-title:hover { color: var(--accent); text-decoration: underline; }
  .td-summary { font-size: 1.01rem; color: var(--ink-light); font-weight: 400; margin-top: 3px; max-width: 392px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-date { font-size: 1.05rem; color: var(--ink-light); white-space: nowrap; }
  .td-position { font-size: 1.05rem; color: var(--ink-light); }
  .td-author-name { font-size: 1.12rem; color: var(--ink-mid); }

  .jongwon-badge { font-size: 0.87rem; padding: 3px 10px; border-radius: 3px; font-family: 'IM Fell English', serif; white-space: nowrap; font-weight: 600; }
  .j-02 { background: #fde8e0; color: #8b2e0f; }
  .j-03 { background: #e0eafd; color: #1a3a8b; }
  .j-04 { background: #e8fde0; color: #2a6a0f; }
  .j-05 { background: #fdf5e0; color: #8b6a0f; }
  .j-etc { background: var(--bg); color: var(--ink-light); border: 1px solid var(--border); }

  mark { background: #fff3cd; color: var(--ink); border-radius: 2px; padding: 0 1px; }

  .empty-state {
    text-align: center;
    padding: 84px 28px;           /* 60×1.4  20×1.4 */
    color: var(--ink-light);
    font-style: italic;
    font-family: 'IM Fell English', serif;
    font-size: 1.26rem;           /* 0.9×1.4 */
  }

  /* ── 저장 상태 알림 ── */
  .notice {
    padding: 11px 22px;           /* 8×1.4  16×1.4 */
    font-size: 1.09rem;           /* 0.78×1.4 */
    border-radius: 4px;
    margin-bottom: 20px;          /* 14×1.4 */
    display: none;
  }
  .notice.show { display: block; }
  .notice.saving { background: #fff8e0; color: #8b6a0f; border: 1px solid #e8d8a0; }
  .notice.success { background: #e0f0e8; color: #1a6a3a; border: 1px solid #a0d8b8; }
  .notice.error { background: #fde8e0; color: #8b2e0f; border: 1px solid #e8b0a0; }

  /* ── 모달 ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 39px 45px;           /* 28×1.4  32×1.4 */
    width: 840px;                 /* 600×1.4 */
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  .modal h2 {
    font-family: 'IM Fell English', serif;
    font-size: 1.54rem;           /* 1.1×1.4 */
    color: var(--accent);
    margin-bottom: 28px;          /* 20×1.4 */
    padding-bottom: 14px;         /* 10×1.4 */
    border-bottom: 1px solid var(--border-light);
  }

  .form-group { margin-bottom: 20px; }   /* 14×1.4 */
  .form-group label {
    display: block;
    font-size: 1.05rem;           /* 0.75×1.4 */
    font-weight: 600;
    color: var(--ink-light);
    letter-spacing: 0.05em;
    margin-bottom: 7px;           /* 5×1.4≈7 */
    text-transform: uppercase;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 11px 14px;           /* 8×1.4  10×1.4 */
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    font-family: 'Noto Serif KR', serif;
    font-size: 1.19rem;           /* 0.85×1.4 */
    color: var(--ink);
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 98px; line-height: 1.7; }   /* 70×1.4 */

  .form-row { display: flex; gap: 20px; }   /* 14×1.4 */
  .form-row .form-group { flex: 1; }

  .modal-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 31px;             /* 22×1.4 */
    padding-top: 22px;            /* 16×1.4 */
    border-top: 1px solid var(--border-light);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 34px;                /* 24×1.4 */
    font-size: 1.01rem;           /* 0.72×1.4 */
    color: var(--border);
    border-top: 1px solid var(--border-light);
    font-family: 'IM Fell English', serif;
    font-style: italic;
  }


  /* ── 태그 ── */
  .tag-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    display: inline-block;
    font-size: 0.82rem;
    padding: 2px 9px;
    border-radius: 20px;
    background: var(--border-light);
    color: var(--ink-light);
    font-family: 'Noto Serif KR', serif;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tag:hover { background: var(--accent); color: white; }
  .tag.active-filter { background: var(--accent); color: white; font-weight: 600; }
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px;
    background: var(--bg); min-height: 48px; cursor: text; }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag-chip { display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent); color: white; border-radius: 20px;
    padding: 2px 10px; font-size: 0.88rem; }
  .tag-chip button { background: none; border: none; color: white;
    cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 2px; }
  .tag-raw-input { border: none; outline: none; background: none;
    font-family: 'Noto Serif KR', serif; font-size: 1.05rem; flex: 1; min-width: 80px; }


  /* ── 태그 필터 바 ── */
  .tag-filter-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
    padding: 12px 16px;
    background: var(--paper);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    min-height: 50px;
  }
  .tag-filter-bar.empty { display: none; }
  .tag-filter-label {
    font-family: 'IM Fell English', serif;
    font-size: 0.88rem;
    color: var(--ink-light);
    font-style: italic;
    margin-right: 4px;
    white-space: nowrap;
  }
  .tag-filter-clear {
    margin-left: auto;
    font-size: 0.82rem;
    color: var(--ink-light);
    cursor: pointer;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    white-space: nowrap;
  }
  .tag-filter-clear:hover { color: var(--accent); text-decoration: underline; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="breadcrumb">
        <a href="index.html">← 열람실 홈</a>
        <span style="margin:0 6px;color:var(--gold);">›</span>
        <span id="col-label">컬렉션</span>
      </div>
      <h1>
        <span id="col-title">문건 목록</span>
        <em id="col-title-cn"></em>
      </h1>
    </div>

  </div>
</header>

<main>

  <!-- 전종 탭 -->
  <div class="jongwon-tabs" id="jongwon-tabs"></div>

  <!-- 태그 필터 바 -->
  <div class="tag-filter-bar empty" id="tag-filter-bar">
    <span class="tag-filter-label">태그 필터 (AND):</span>
    <span id="tag-filter-chips"></span>
    <span class="tag-filter-clear" onclick="clearTagFilter()">✕ 필터 초기화</span>
  </div>

  <!-- 알림 -->
  <div class="notice" id="notice"></div>

  <!-- 툴바 -->
  <div class="toolbar">
    <div class="search-bar">
      <input type="text" class="search-input" id="search-input"
        placeholder="당안번호, 제목, 발송자, 날짜, 요약 검색…">
      <button class="btn btn-search" onclick="applyFilters()">검색</button>
    </div>
    <button class="btn btn-add" onclick="openAddModal()">＋ 새 문건 추가</button>
  </div>

  <!-- 결과 요약 -->
  <div class="result-summary" id="result-summary"></div>

  <!-- 테이블 -->
  <table class="doc-table">
    <thead>
      <tr>
        <th onclick="sortBy('jongwon')">전종</th>
        <th onclick="sortBy('id')">당안번호</th>
        <th onclick="sortBy('position')">발송자 관직</th>
        <th onclick="sortBy('author')">발송자 이름</th>
        <th onclick="sortBy('title')">제목</th>
        <th onclick="sortBy('date')">날짜</th>
        <th class="no-sort">태그</th>
        <th class="no-sort">관리</th>
      </tr>
    </thead>
    <tbody id="doc-tbody"></tbody>
  </table>

  <div class="empty-state" id="empty-state">
    등록된 문건이 없습니다 — [＋ 새 문건 추가]로 시작하세요
  </div>

</main>

<footer>
  mucenfere 당안 열람실 · Personal Historical Archive · 私人檔案閱覽室
</footer>

<!-- ── 추가/수정 모달 ── -->
<div class="modal-overlay" id="doc-modal">
  <div class="modal">
    <h2 id="modal-title">새 문건 추가</h2>

    <div class="form-row">
      <div class="form-group">
        <label>당안번호 *</label>
        <input type="text" id="f-id" placeholder="예: 04-02-002-000038-0023">
      </div>
      <div class="form-group">
        <label>전종 (全宗) *</label>
        <select id="f-jongwon">
          <option value="02">02 — 궁중당 (宮中檔)</option>
          <option value="03">03 — 군기처 (軍機處)</option>
          <option value="04" selected>04 — 주비주접 (硃批奏摺)</option>
          <option value="05">05 — 내무부 (內務府)</option>
          <option value="etc">기타</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>제목</label>
      <input type="text" id="f-title" placeholder="문건 제목 또는 내용 요약 제목">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>날짜</label>
        <input type="text" id="f-date" placeholder="예: 康熙五十一年六月十三日">
      </div>
      <div class="form-group">
        <label>전사 날짜</label>
        <input type="text" id="f-transcribed" placeholder="예: 20240308">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>발송자 관직</label>
        <input type="text" id="f-position" placeholder="예: 성경장군">
      </div>
      <div class="form-group">
        <label>발송자 이름</label>
        <input type="text" id="f-author" placeholder="예: 唐保住 (tangbooju)">
      </div>
    </div>

    <div class="form-group">
      <label>요약</label>
      <textarea id="f-summary" placeholder="문건 내용 간략 요약 (선택)"></textarea>
    </div>

    <div class="form-group">
      <label>태그</label>
      <div class="tag-input-wrap" id="tag-input-wrap">
        <input type="text" class="tag-raw-input" id="tag-raw-input"
          placeholder="태그 입력 후 Enter (예: 성경, 카룬, 군정)"
          onkeydown="handleTagInput(event)">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-delete" id="btn-delete" style="display:none" onclick="deleteDoc()">삭제</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn btn-save" onclick="saveDoc()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 전종 정의 ──────────────────────────────────────────
const JONGWON = {
  '02': { name: '궁중당',   cn: '宮中檔' },
  '03': { name: '군기처',   cn: '軍機處' },
  '04': { name: '주비주접', cn: '硃批奏摺' },
  '05': { name: '내무부',   cn: '內務府' },
};

function getJongwonInfo(code) { return JONGWON[code] || { name: code, cn: '' }; }
function getJongwonBadgeClass(code) {
  return { '02':'j-02','03':'j-03','04':'j-04','05':'j-05' }[code] || 'j-etc';
}

// ── GitHub 설정 (localStorage) ─────────────────────────
function ghConfig() {
  return {
    token:  localStorage.getItem('gh_token')  || '',
    owner:  localStorage.getItem('gh_owner')  || '',
    repo:   localStorage.getItem('gh_repo')   || '',
    branch: localStorage.getItem('gh_branch') || 'main',
  };
}

// ── 상태 ───────────────────────────────────────────────
let docs = [];          // 현재 로드된 문건 목록
let activeJongwon = 'all';
let searchQuery = '';
let sortKey = 'id';
let sortAsc = true;
let editingId = null;   // 수정 중인 문건 ID (null이면 신규)
let currentCol = 'archive';
let activeTags = [];        // AND 필터 중인 태그 목록

// ── 초기화 ─────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  currentCol = 'archive';

  if (currentCol === 'archive') {
    document.getElementById('col-label').textContent = '제1역사당안관 소장 당안';
    document.getElementById('col-title').textContent = '제1역사당안관 소장 당안';
    document.getElementById('col-title-cn').textContent = '第一歷史檔案館藏清代檔案';

  } else {
    document.getElementById('col-label').textContent = '영인 출판 당안 자료';
    document.getElementById('col-title').textContent = '영인 출판 당안 자료';
    document.getElementById('col-title-cn').textContent = '影印出版清代檔案';

  }

  await loadDocs();

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilters();
  });
}

// ── 문건 목록 로드 (GitHub API) ────────────────────────
async function loadDocs() {
  const cfg = ghConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    docs = [];
    renderTabs();
    applyFilters();
    return;
  }

  const path = `data/${currentCol}/index.json`;
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;

  try {
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${cfg.token}` }
    });
    if (res.status === 404) {
      docs = [];
    } else if (res.ok) {
      const data = await res.json();
      const content = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
      docs = JSON.parse(content);
    }
  } catch(e) {
    docs = [];
  }

  renderTabs();
  applyFilters();
}

// ── 전종 탭 렌더 ───────────────────────────────────────
function renderTabs() {
  const counts = {};
  docs.forEach(d => { counts[d.jongwon] = (counts[d.jongwon] || 0) + 1; });

  const container = document.getElementById('jongwon-tabs');
  let html = `
    <div class="j-tab ${activeJongwon==='all'?'active':''}" onclick="setJongwon('all')">
      전체 <span class="tab-count">${docs.length}</span>
    </div>`;

  Object.entries(JONGWON).forEach(([code, info]) => {
    if (!counts[code]) return;
    html += `
      <div class="j-tab ${activeJongwon===code?'active':''}" onclick="setJongwon('${code}')">
        ${code}- ${info.name} <span class="tab-count">${counts[code]}</span>
      </div>`;
  });

  container.innerHTML = html;
}

// ── 필터 & 렌더 ────────────────────────────────────────
function applyFilters() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();

  let filtered = [...docs];

  if (activeJongwon !== 'all')
    filtered = filtered.filter(d => d.jongwon === activeJongwon);

  // 태그 AND 필터
  if (activeTags.length > 0)
    filtered = filtered.filter(d =>
      activeTags.every(at => (d.tags||[]).includes(at))
    );

  if (searchQuery)
    filtered = filtered.filter(d =>
      (d.id       ||'').toLowerCase().includes(searchQuery) ||
      (d.title    ||'').toLowerCase().includes(searchQuery) ||
      (d.author   ||'').toLowerCase().includes(searchQuery) ||
      (d.position ||'').toLowerCase().includes(searchQuery) ||
      (d.date     ||'').toLowerCase().includes(searchQuery) ||
      (d.summary  ||'').toLowerCase().includes(searchQuery) ||
      (d.tags||[]).some(t => t.toLowerCase().includes(searchQuery))
    );

  filtered.sort((a, b) => {
    let va = a[sortKey]||'', vb = b[sortKey]||'';
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  renderTable(filtered);
}

function renderTable(filtered) {
  const tbody  = document.getElementById('doc-tbody');
  const empty  = document.getElementById('empty-state');
  const summary= document.getElementById('result-summary');

  summary.innerHTML = `총 <strong>${filtered.length}</strong>건`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(doc => {
    const jInfo = getJongwonInfo(doc.jongwon);
    const jCls  = getJongwonBadgeClass(doc.jongwon);
    return `
      <tr>
        <td><span class="jongwon-badge ${jCls}">${doc.jongwon}- ${jInfo.name}</span></td>
        <td class="td-id td-title" onclick="openDoc('${doc.id}')">${hl(doc.id)}</td>
        <td class="td-position">${hl(doc.position||'')}</td>
        <td class="td-author-name">${hl(doc.author||'')}</td>
        <td>
          <div class="td-title" onclick="openDoc('${doc.id}')">${hl(doc.title)}</div>
          <div class="td-summary">${hl(doc.summary||'')}</div>
        </td>
        <td class="td-date">${doc.date||''}</td>
        <td>
          <div class="tag-list">${[...(doc.tags||[])].sort((a,b)=>a.localeCompare(b,'ko')).map(t=>`<span class="tag" onclick="filterByTag('${t}')">${t}</span>`).join('')}</div>
        </td>
        <td>
          <button class="btn btn-cancel" style="padding:6px 14px;font-size:1.01rem"
            onclick="openEditModal('${doc.id}')">수정</button>
        </td>
      </tr>`;
  }).join('');
}

function hl(text) {
  if (!searchQuery || !text) return text||'';
  const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ── 모달 열기/닫기 ─────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '새 문건 추가';
  document.getElementById('btn-delete').style.display = 'none';
  ['f-id','f-title','f-date','f-transcribed','f-position','f-author','f-summary']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-jongwon').value = '04';
  document.getElementById('f-id').disabled = false;
  renderTagChips([]);
  document.getElementById('doc-modal').classList.add('open');
}

function openEditModal(id) {
  const doc = docs.find(d => d.id === id);
  if (!doc) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '문건 수정';
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('f-id').value          = doc.id || '';
  document.getElementById('f-id').disabled       = true;
  document.getElementById('f-jongwon').value     = doc.jongwon || '04';
  document.getElementById('f-title').value       = doc.title || '';
  document.getElementById('f-date').value        = doc.date || '';
  document.getElementById('f-transcribed').value = doc.transcribed || '';
  document.getElementById('f-position').value    = doc.position || '';
  document.getElementById('f-author').value      = doc.author || '';
  document.getElementById('f-summary').value     = doc.summary || '';
  renderTagChips(doc.tags || []);
  document.getElementById('doc-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('doc-modal').classList.remove('open');
}

// ── 저장 ───────────────────────────────────────────────
async function saveDoc() {
  const id = editingId || document.getElementById('f-id').value.trim();
  if (!id) { alert('당안번호는 필수입니다.'); return; }

  const docData = {
    id,
    jongwon:     document.getElementById('f-jongwon').value,
    title:       document.getElementById('f-title').value.trim(),
    date:        document.getElementById('f-date').value.trim(),
    transcribed: document.getElementById('f-transcribed').value.trim(),
    position:    document.getElementById('f-position').value.trim(),
    author:      document.getElementById('f-author').value.trim(),
    summary:     document.getElementById('f-summary').value.trim(),
    tags:        getCurrentTags(),
    filename:    id.replace(/[^a-zA-Z0-9\-]/g, '-') + '.json',
  };

  if (!editingId) {
    if (docs.find(d => d.id === id)) { alert('이미 존재하는 당안번호입니다.'); return; }
    docs.push(docData);
  } else {
    const idx = docs.findIndex(d => d.id === editingId);
    if (idx !== -1) docs[idx] = { ...docs[idx], ...docData };
  }

  closeModal();
  renderTabs();
  applyFilters();

  const cfg = ghConfig();
  if (cfg.token && cfg.owner && cfg.repo) {
    showNotice('saving', '저장 중…');
    try {
      // 1) 개별 문건 파일 생성 (신규만)
      if (!editingId) {
        const emptyDoc = { ...docData, original: '', translation: '' };
        await ghPut(
          `data/${currentCol}/${docData.filename}`,
          JSON.stringify(emptyDoc, null, 2),
          `Add ${id}`
        );
      }
      // 2) index.json 업데이트
      await ghPut(
        `data/${currentCol}/index.json`,
        JSON.stringify(docs, null, 2),
        `Update index: ${editingId ? 'edit' : 'add'} ${id}`
      );
      showNotice('success', `✓ GitHub에 저장되었습니다 — ${id}`);
    } catch(e) {
      showNotice('error', '저장 실패: ' + e.message);
    }
  } else {
    showNotice('saving', 'GitHub 미연결 — index.html 설정에서 토큰을 입력하면 실제 저장됩니다');
  }
}

// ── 삭제 ───────────────────────────────────────────────
async function deleteDoc() {
  if (!editingId) return;
  if (!confirm(`[${editingId}] 문건을 삭제하시겠습니까?`)) return;

  docs = docs.filter(d => d.id !== editingId);
  closeModal();
  renderTabs();
  applyFilters();

  const cfg = ghConfig();
  if (cfg.token && cfg.owner && cfg.repo) {
    showNotice('saving', '삭제 중…');
    try {
      await ghPut(
        `data/${currentCol}/index.json`,
        JSON.stringify(docs, null, 2),
        `Delete ${editingId} from index`
      );
      showNotice('success', `✓ 삭제되었습니다 — ${editingId}`);
    } catch(e) {
      showNotice('error', '삭제 실패: ' + e.message);
    }
  }
}

// ── GitHub API PUT ─────────────────────────────────────
async function ghPut(path, content, message) {
  const cfg = ghConfig();
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Content-Type': 'application/json'
  };

  // 기존 SHA 확인
  let sha = undefined;
  try {
    const res = await fetch(url, { headers });
    if (res.ok) { const d = await res.json(); sha = d.sha; }
  } catch(e) {}

  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: cfg.branch
  };
  if (sha) body.sha = sha;

  const res = await fetch(url, { method:'PUT', headers, body: JSON.stringify(body) });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || res.status);
  }
}


// ── 태그 입력 관리 ─────────────────────────────────────
let currentTags = [];

function renderTagChips(tags) {
  currentTags = [...tags];
  const wrap = document.getElementById('tag-input-wrap');
  // 기존 칩 제거
  wrap.querySelectorAll('.tag-chip').forEach(el => el.remove());
  const input = document.getElementById('tag-raw-input');
  currentTags.forEach(tag => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${tag}<button type="button" onclick="removeTag('${tag}')">×</button>`;
    wrap.insertBefore(chip, input);
  });
}

function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = document.getElementById('tag-raw-input').value.trim();
    if (val && !currentTags.includes(val)) {
      currentTags.push(val);
      renderTagChips(currentTags);
    }
    document.getElementById('tag-raw-input').value = '';
  } else if (e.key === 'Backspace' && document.getElementById('tag-raw-input').value === '') {
    currentTags.pop();
    renderTagChips(currentTags);
  }
}

function removeTag(tag) {
  currentTags = currentTags.filter(t => t !== tag);
  renderTagChips(currentTags);
}

function getCurrentTags() { return [...currentTags]; }

function filterByTag(tag) {
  if (!activeTags.includes(tag)) {
    activeTags.push(tag);
  } else {
    activeTags = activeTags.filter(t => t !== tag);
  }
  updateTagFilterBar();
  renderTable_refresh();
  applyFilters();
}

function updateTagFilterBar() {
  const bar   = document.getElementById('tag-filter-bar');
  const chips = document.getElementById('tag-filter-chips');

  if (activeTags.length === 0) {
    bar.classList.add('empty');
    chips.innerHTML = '';
    return;
  }

  bar.classList.remove('empty');
  chips.innerHTML = activeTags.map(t =>
    `<span class="tag active-filter" onclick="filterByTag('${t}')">${t} ✕</span>`
  ).join('');
}

function renderTable_refresh() {
  // 테이블의 태그 칩 active 상태 갱신
  document.querySelectorAll('.tag-list .tag').forEach(el => {
    const tag = el.textContent;
    el.classList.toggle('active-filter', activeTags.includes(tag));
  });
}

function clearTagFilter() {
  activeTags = [];
  updateTagFilterBar();
  applyFilters();
}

// ── 태그 검색 포함 ─────────────────────────────────────

// ── 알림 ───────────────────────────────────────────────
let noticeTimer;
function showNotice(type, msg) {
  const el = document.getElementById('notice');
  el.className = `notice ${type} show`;
  el.textContent = msg;
  clearTimeout(noticeTimer);
  if (type === 'success') {
    noticeTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }
}

// ── 유틸 ───────────────────────────────────────────────
function setJongwon(code) { activeJongwon = code; renderTabs(); applyFilters(); }

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  applyFilters();
}

function openDoc(id) {
  location.href = `viewer.html?id=${encodeURIComponent(id)}`;
}

init();
