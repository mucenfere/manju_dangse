<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문건 열람 — 청대 당안 열람실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=IM+Fell+English:ital@0;1&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #f7f8fa;
    --paper:        #ffffff;
    --ink:          #1a1e2e;
    --ink-mid:      #3a3f52;
    --ink-light:    #7a8099;
    --accent:       #8b2e0f;
    --accent-warm:  #c4520a;
    --gold:         #b8912a;
    --border:       #d4d8e2;
    --border-light: #e8eaf0;
    --header-bg:    #e8dcc8;
    --pane-left:    #fdfaf6;
    --pane-right:   #f8fafd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Noto Serif KR', serif;
    background: var(--bg);
    color: var(--ink);
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    border-bottom: 3px solid var(--gold);
    padding: 18px 40px;
    flex-shrink: 0;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .header-left { display: flex; flex-direction: column; gap: 4px; }

  .breadcrumb {
    font-family: 'IM Fell English', serif;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb span { margin: 0 6px; color: var(--gold); }

  .doc-id {
    font-family: 'IM Fell English', serif;
    font-size: 1.1rem;
    color: var(--ink);
    font-weight: 400;
  }

  /* 메타데이터 행 */
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 8px;
    font-size: 0.9rem;
    color: var(--ink-light);
  }

  .meta-item { display: flex; flex-direction: column; gap: 1px; }
  .meta-label {
    font-family: 'IM Fell English', serif;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    opacity: 0.8;
  }
  .meta-value { font-size: 0.92rem; color: var(--ink-mid); }

  /* 전종 뱃지 */
  .jongwon-badge {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'IM Fell English', serif;
    font-weight: 600;
    align-self: flex-start;
    margin-top: 2px;
  }
  .j-02 { background: #fde8e0; color: #8b2e0f; }
  .j-03 { background: #e0eafd; color: #1a3a8b; }
  .j-04 { background: #e8fde0; color: #2a6a0f; }
  .j-05 { background: #fdf5e0; color: #8b6a0f; }
  .j-etc { background: var(--bg); color: var(--ink-light); border: 1px solid var(--border); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  /* ── 버튼 ── */
  .btn {
    padding: 10px 20px;
    border-radius: 4px;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-save { background: var(--accent); color: white; }
  .btn-save:hover { background: var(--accent-warm); }
  .btn-save:disabled { background: var(--border); color: var(--ink-light); cursor: default; }
  .btn-outline {
    background: none;
    border: 1px solid var(--border);
    color: var(--ink-light);
  }
  .btn-outline:hover { border-color: var(--ink); color: var(--ink); }

  /* ── 알림 ── */
  .notice {
    padding: 8px 18px;
    font-size: 0.82rem;
    border-radius: 4px;
    display: none;
    white-space: nowrap;
  }
  .notice.show { display: block; }
  .notice.saving { background: #fff8e0; color: #8b6a0f; border: 1px solid #e8d8a0; }
  .notice.success { background: #e0f0e8; color: #1a6a3a; border: 1px solid #a0d8b8; }
  .notice.error { background: #fde8e0; color: #8b2e0f; border: 1px solid #e8b0a0; }

  /* ── PANE LAYOUT ── */
  .viewer-body {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .panes {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane-left  { background: var(--pane-left); border-right: 2px solid var(--border); }
  .pane-right { background: var(--pane-right); }

  /* 패널 헤더 */
  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }

  .pane-title {
    font-family: 'IM Fell English', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .pane-hint {
    font-size: 0.72rem;
    color: var(--border);
    font-family: 'IM Fell English', serif;
    font-style: italic;
  }

  /* 편집 영역 */
  .pane-editor {
    flex: 1;
    padding: 32px 40px;
    overflow-y: auto;
    font-size: 1.05rem;
    line-height: 2.0;
    color: var(--ink);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    width: 100%;
    font-family: 'Noto Serif KR', serif;
    /* 수정 전: 읽기 전용처럼 보임 */
    caret-color: var(--accent);
  }

  .pane-editor.original {
    font-family: 'Noto Serif SC', serif;
    letter-spacing: 0.02em;
    color: var(--ink-mid);
  }

  .pane-editor:focus {
    outline: none;
  }

  /* 편집 가능 상태 표시 */
  .pane-editor[contenteditable="true"]:focus {
    background: rgba(139, 46, 15, 0.015);
  }

  /* 빈 상태 플레이스홀더 */
  .pane-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--border);
    pointer-events: none;
    font-style: italic;
  }

  /* ── DIVIDER (드래그 가능) ── */
  .divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
    z-index: 10;
  }
  .divider:hover, .divider.dragging { background: var(--accent); }

  /* ── 하단 상태바 ── */
  .statusbar {
    background: var(--bg);
    border-top: 1px solid var(--border-light);
    padding: 6px 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 0.72rem;
    color: var(--ink-light);
    font-family: 'IM Fell English', serif;
    flex-shrink: 0;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    display: inline-block;
    margin-right: 5px;
  }
  .status-dot.modified { background: var(--accent-warm); }
  .status-dot.saving   { background: var(--gold); }
  .status-dot.saved    { background: #2a8a4a; }
  .status-dot.error    { background: #c04040; }

  /* ── 로딩 ── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(247,248,250,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-light);
    font-size: 1rem;
    z-index: 50;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  header { animation: fadeUp 0.35s ease both; }
  .panes { animation: fadeUp 0.35s 0.05s ease both; }
</style>
</head>
<body>

<div class="viewer-body">

  <!-- ── HEADER ── -->
  <header>
    <div class="header-inner">
      <div class="header-left">
        <div class="breadcrumb">
          <a href="index.html">열람실 홈</a>
          <span>›</span>
          <a href="#" id="breadcrumb-col">컬렉션</a>
          <span>›</span>
          <span id="breadcrumb-id">—</span>
        </div>
        <div class="doc-id" id="doc-id-display">문건 로딩 중…</div>
        <div class="meta-row" id="meta-row"></div>
      </div>

      <div class="header-right">
        <div class="notice" id="notice"></div>
        <button class="btn btn-outline" onclick="history.back()">← 목록</button>
      </div>
    </div>
  </header>

  <!-- ── PANES ── -->
  <div class="panes" id="panes">

    <!-- 원문 패널 -->
    <div class="pane pane-left" id="pane-left">
      <div class="pane-header">
        <span class="pane-title">原文 · Original Text</span>
        <span class="pane-hint">편집 가능</span>
      </div>
      <div
        class="pane-editor original"
        id="editor-original"
        contenteditable="true"
        data-placeholder="원문(만주어/한자)을 입력하세요…"
        spellcheck="false"
      ></div>
    </div>

    <!-- 드래그 구분선 -->
    <div class="divider" id="divider"></div>

    <!-- 번역 패널 -->
    <div class="pane pane-right" id="pane-right">
      <div class="pane-header">
        <span class="pane-title">飜譯 · Korean Translation</span>
        <span class="pane-hint">편집 가능</span>
      </div>
      <div
        class="pane-editor"
        id="editor-translation"
        contenteditable="true"
        data-placeholder="한국어 번역을 입력하세요…"
        spellcheck="false"
      ></div>
    </div>

  </div>

  <!-- ── 상태바 ── -->
  <div class="statusbar">
    <span>
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">로딩 중</span>
    </span>
    <span id="status-chars-orig">원문 — 자</span>
    <span id="status-chars-trans">번역 — 자</span>
  </div>

</div>

<script>
// ── 전종 정의 ──────────────────────────────────────────
const JONGWON = {
  '02': { name: '궁중당' },
  '03': { name: '군기처' },
  '04': { name: '주비주접' },
  '05': { name: '내무부' },
};

function getJongwonBadgeClass(code) {
  return { '02':'j-02','03':'j-03','04':'j-04','05':'j-05' }[code] || 'j-etc';
}

// ── GitHub 설정 ────────────────────────────────────────
function ghConfig() {
  return {
    token:  localStorage.getItem('gh_token')  || '',
    owner:  localStorage.getItem('gh_owner')  || '',
    repo:   localStorage.getItem('gh_repo')   || '',
    branch: localStorage.getItem('gh_branch') || 'main',
  };
}

// ── 상태 ───────────────────────────────────────────────
let currentDoc = null;
let currentCol = 'archive';
let isModified = false;
let noticeTimer = null;

// ── 초기화 ─────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  const docId  = params.get('id');
  currentCol   = params.get('col') || 'archive';

  // 브레드크럼
  const colLabel = currentCol === 'archive' ? '제1역사당안관' : '영인 출판 자료';
  document.getElementById('breadcrumb-col').textContent = colLabel;
  document.getElementById('breadcrumb-col').href = `collection.html?col=${currentCol}`;

  if (!docId) {
    setStatus('error', '문건 ID가 없습니다');
    return;
  }

  document.getElementById('breadcrumb-id').textContent = docId;
  await loadDoc(docId);
  setupDivider();
  setupChangeTracking();
}

// ── 문건 로드 ──────────────────────────────────────────
async function loadDoc(docId) {
  const cfg = ghConfig();

  // GitHub 미연결: 빈 문서로 시작
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    renderMeta({ id: docId, jongwon: '', title: '', date: '', position: '', author: '', summary: '' });
    setStatus('ready', 'GitHub 미연결 — 로컬 편집만 가능');
    return;
  }

  setStatus('loading', '불러오는 중…');

  // index.json에서 메타데이터 가져오기
  try {
    const indexUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data/${currentCol}/index.json`;
    const indexRes = await fetch(indexUrl, {
      headers: { 'Authorization': `token ${cfg.token}` }
    });

    if (indexRes.ok) {
      const indexData = await indexRes.json();
      const indexContent = JSON.parse(atob(indexData.content.replace(/\n/g, '')));
      const meta = indexContent.find(d => d.id === docId);
      if (meta) renderMeta(meta);
    }
  } catch(e) {}

  // 개별 문건 파일 로드
  try {
    const filename = docId.replace(/[^a-zA-Z0-9\-]/g, '-') + '.json';
    const fileUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data/${currentCol}/${filename}`;
    const fileRes = await fetch(fileUrl, {
      headers: { 'Authorization': `token ${cfg.token}` }
    });

    if (fileRes.ok) {
      const fileData = await fileRes.json();
      const decoded = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
      currentDoc = JSON.parse(decoded);
      currentDoc._sha = fileData.sha;

      document.getElementById('editor-original').innerText    = currentDoc.original    || '';
      document.getElementById('editor-translation').innerText = currentDoc.translation || '';

      updateCharCount();
      setStatus('saved', '불러오기 완료');
    } else if (fileRes.status === 404) {
      setStatus('ready', '새 문건 — 내용을 입력하고 저장하세요');
    }
  } catch(e) {
    setStatus('error', '로드 실패: ' + e.message);
  }
}

// ── 메타데이터 렌더 ────────────────────────────────────
function renderMeta(meta) {
  document.getElementById('doc-id-display').textContent = meta.id || '—';
  document.title = `${meta.id || '문건'} — 청대 당안 열람실`;

  const jInfo = JONGWON[meta.jongwon] || { name: meta.jongwon || '' };
  const jCls  = getJongwonBadgeClass(meta.jongwon);

  const items = [
    meta.jongwon ? `<div class="meta-item"><span class="meta-label">전종</span><span class="jongwon-badge ${jCls}">${meta.jongwon}- ${jInfo.name}</span></div>` : '',
    meta.date     ? `<div class="meta-item"><span class="meta-label">날짜</span><span class="meta-value">${meta.date}</span></div>` : '',
    meta.position ? `<div class="meta-item"><span class="meta-label">관직</span><span class="meta-value">${meta.position}</span></div>` : '',
    meta.author   ? `<div class="meta-item"><span class="meta-label">발송자</span><span class="meta-value">${meta.author}</span></div>` : '',
    meta.title    ? `<div class="meta-item"><span class="meta-label">제목</span><span class="meta-value">${meta.title}</span></div>` : '',
  ].filter(Boolean).join('');

  document.getElementById('meta-row').innerHTML = items;
}

// ── 자동저장 (디바운스 2초) ────────────────────────────
let autosaveTimer = null;
let isSaving = false;

function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  setStatus('modified', '수정됨 — 잠시 후 저장…');
  autosaveTimer = setTimeout(() => saveDoc(), 2000);
}

async function saveDoc() {
  const cfg = ghConfig();
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    // GitHub 미연결이면 상태만 표시하고 조용히 넘김
    setStatus('modified', '수정됨 — GitHub 미연결');
    return;
  }

  if (isSaving) return;   // 중복 저장 방지
  isSaving = true;

  const originalText    = document.getElementById('editor-original').innerText;
  const translationText = document.getElementById('editor-translation').innerText;

  const params   = new URLSearchParams(location.search);
  const docId    = params.get('id');
  const filename = docId.replace(/[^a-zA-Z0-9\-]/g, '-') + '.json';

  const newContent = {
    ...(currentDoc || {}),
    id:          docId,
    original:    originalText,
    translation: translationText,
    updatedAt:   new Date().toISOString(),
  };
  delete newContent._sha;

  setStatus('saving', '저장 중…');

  try {
    await ghPut(
      `data/${currentCol}/${filename}`,
      JSON.stringify(newContent, null, 2),
      `Update ${docId}`,
      currentDoc?._sha
    );
    isModified = false;
    setStatus('saved', '자동저장 완료 · ' + new Date().toLocaleTimeString('ko-KR'));
  } catch(e) {
    setStatus('error', '저장 실패 — ' + e.message);
  } finally {
    isSaving = false;
  }
}

// ── GitHub PUT ─────────────────────────────────────────
async function ghPut(path, content, message, sha) {
  const cfg = ghConfig();
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const headers = {
    'Authorization': `token ${cfg.token}`,
    'Content-Type': 'application/json'
  };

  if (!sha) {
    try {
      const r = await fetch(url, { headers });
      if (r.ok) { const d = await r.json(); sha = d.sha; }
    } catch(e) {}
  }

  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: cfg.branch
  };
  if (sha) body.sha = sha;

  const res = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(body) });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || res.status);
  }

  const result = await res.json();
  if (currentDoc) currentDoc._sha = result.content?.sha;
}

// ── 변경 감지 ──────────────────────────────────────────
function setupChangeTracking() {
  ['editor-original', 'editor-translation'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      isModified = true;
      updateCharCount();
      scheduleAutosave();
    });
  });

  // 페이지 떠날 때 미저장 경고
  window.addEventListener('beforeunload', e => {
    if (isModified && autosaveTimer) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}

// ── 글자 수 ────────────────────────────────────────────
function updateCharCount() {
  const orig  = document.getElementById('editor-original').innerText.replace(/\n/g,'');
  const trans = document.getElementById('editor-translation').innerText.replace(/\n/g,'');
  document.getElementById('status-chars-orig').textContent  = `원문 ${orig.length.toLocaleString()}자`;
  document.getElementById('status-chars-trans').textContent = `번역 ${trans.length.toLocaleString()}자`;
}

// ── 상태 표시 ──────────────────────────────────────────
function setStatus(type, msg) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className = 'status-dot';
  if (type === 'saved')    dot.classList.add('saved');
  if (type === 'modified') dot.classList.add('modified');
  if (type === 'saving')   dot.classList.add('saving');
  if (type === 'error')    dot.classList.add('error');
  text.textContent = msg;
}

function showNotice(type, msg) {
  const el = document.getElementById('notice');
  el.className = `notice ${type} show`;
  el.textContent = msg;
  clearTimeout(noticeTimer);
  if (type === 'success') {
    noticeTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }
}

// ── 분할선 드래그 ──────────────────────────────────────
function setupDivider() {
  const divider  = document.getElementById('divider');
  const paneLeft = document.getElementById('pane-left');
  const panes    = document.getElementById('panes');
  let dragging = false, startX = 0, startW = 0;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = paneLeft.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const total = panes.getBoundingClientRect().width;
    const newW  = Math.min(Math.max(startW + (e.clientX - startX), total * 0.2), total * 0.8);
    paneLeft.style.flex = 'none';
    paneLeft.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
}

init();
</script>
</body>
</html>
